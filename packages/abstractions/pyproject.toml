[project]
name = "microsoft-kiota-abstractions"
version = "1.9.7"
description = "Core abstractions for kiota generated libraries in Python"
authors = [{name = "Microsoft", email = "graphtooling+python@microsoft.com"}]
license = "MIT"
readme = "README.md"
keywords = ["kiota", "openAPI", "Microsoft", "Graph"]
requires-python = ">=3.9,<4.0"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "std-uritemplate>=2.0.0",
    "opentelemetry-api>=1.27.0",
    "opentelemetry-sdk>=1.27.0",
]

[project.urls]
Homepage = "https://github.com/microsoft/kiota#readme"
Repository = "https://github.com/microsoft/kiota-python"
Documentation = "https://learn.microsoft.com/openapi/kiota/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kiota_abstractions"]

[dependency-groups]
dev = [
    "yapf>=0.40.2,<0.44.0",
    "isort>=5.13.2,<7.0.0",
    "pylint>=3.2.7,<4.0.0",
    "mypy>=1.11.2,<2.0.0",
    "pytest>=8.3.2,<9.0.0",
    "pytest-asyncio>=0.24,<0.26",
]

[mypy]
warn_unused_configs = true
files = "kiota_abstractions"

[tool.yapf]
based_on_style = "pep8"
dedent_closing_brackets = true
each_dict_entry_on_separate_line = true
column_limit = 100

[tool.isort]
profile = "hug"